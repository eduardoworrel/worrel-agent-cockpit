# Config auto-contida para rodar em container NÃO-ROOT com filesystem READ-ONLY
# (GuaraCloud): nada escrito em /var — logs vão para stdout/stderr, pid e paths
# temporários ficam em /tmp, e o servidor escuta na porta não-privilegiada 8080.
worker_processes  auto;
pid               /tmp/nginx.pid;
error_log         /dev/stderr warn;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile      on;
    keepalive_timeout  65;

    server {
        listen      8080;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # CSS/JS com cache curto: evita o CDN (Cloudflare) servir asset velho por
        # horas após um deploy. Versionar a URL (styles.css?v=N) força refresh imediato.
        location ~* \.(css|js)$ {
            add_header Cache-Control "public, max-age=300, must-revalidate";
        }
    }
}
